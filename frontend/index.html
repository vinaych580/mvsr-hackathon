<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AgriSim - Farm Strategy Simulator</title>
    <meta name="description" content="Predict yields, plan costs, and prosper. AI-powered farm simulation utilizing claymorphic interfaces for Indian farmers."/>
    
    <!-- Fonts: Fraunces (Headings) and Quicksand (Body Text) -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tailwind JS & Forms Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clay: {
                            bg: '#F4ECDD',
                            surface: '#FBF6EA',
                            deep: '#E8DCC0'
                        },
                        moss: {
                            DEFAULT: '#5C7A4A',
                            deep: '#3F5A33'
                        },
                        terracotta: '#C97B5C',
                        saffron: '#E0A458',
                        soil: '#6B4F3A',
                        bark: '#3B2E25',
                        sky: { wash: '#A9C4C2' },
                        risk: { rust: '#A4453A' }
                    },
                    fontFamily: {
                        heading: ['Fraunces', 'serif'],
                        body: ['Quicksand', 'sans-serif'],
                    },
                    boxShadow: {
                        'clay': '8px 8px 20px rgba(107, 79, 58, 0.18), -6px -6px 16px rgba(255, 250, 235, 0.95), inset 1px 1px 2px rgba(255,255,255,0.6)',
                        'clay-inset': 'inset 8px 8px 20px rgba(107, 79, 58, 0.12), inset -6px -6px 16px rgba(255, 250, 235, 0.95)'
                    },
                    borderRadius: {
                        'clay': '28px',
                        'blob': '48px 16px 40px 12px',
                        'blob-alt': '24px 60px 24px 30px'
                    }
                }
            }
        }
    </script>
    <style>
        /* Base reset & Typography */
        body {
            background-color: #F4ECDD;
            color: #3B2E25;
            font-family: 'Quicksand', sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: opacity 200ms ease-in-out;
            margin: 0; 
            padding: 0;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Subtle Paper Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
            pointer-events: none;
            z-index: 9999;
        }

        h1, h2, h3, h4, h5, .font-heading {
            font-family: 'Fraunces', serif;
            color: #6B4F3A;
            font-optical-sizing: auto;
        }

        /* Tabular lining for prominent numbers */
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }

        /* Clay Button & Card Interactions */
        .clay-btn {
            background-color: #5C7A4A;
            color: #FBF6EA;
            font-family: 'Fraunces', serif;
            font-weight: 600;
            border-radius: 28px;
            box-shadow: 8px 8px 20px rgba(107, 79, 58, 0.18), -6px -6px 16px rgba(255, 250, 235, 0.95), inset 1px 1px 2px rgba(255,255,255,0.6);
            transition: all 120ms ease-in-out;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .clay-btn:hover {
            transform: translateY(-2px);
            background-color: #3F5A33;
            box-shadow: 6px 6px 15px rgba(107, 79, 58, 0.12), -4px -4px 12px rgba(255, 250, 235, 0.95), inset 1px 1px 2px rgba(255,255,255,0.6);
        }
        .clay-btn:active, .clay-btn.active {
            transform: translateY(1px);
            background-color: #3F5A33;
            box-shadow: inset 6px 6px 12px rgba(63, 90, 51, 0.8), inset -4px -4px 8px rgba(100, 130, 80, 0.4);
        }
        
        .clay-card {
            background-color: #FBF6EA;
            border-radius: 28px;
            box-shadow: 8px 8px 20px rgba(107, 79, 58, 0.18), -6px -6px 16px rgba(255, 250, 235, 0.95), inset 1px 1px 2px rgba(255,255,255,0.9);
            transition: all 200ms ease-out;
        }
        .clay-card.interactive:hover {
            transform: translateY(-4px);
            box-shadow: 12px 12px 24px rgba(107, 79, 58, 0.12), -8px -8px 20px rgba(255, 250, 235, 0.95), inset 1px 1px 2px rgba(255,255,255,0.9);
        }

        /* Inset Wells for Inputs */
        .clay-input-well {
            background-color: #E8DCC0;
            border-radius: 16px;
            box-shadow: inset 6px 6px 12px rgba(107, 79, 58, 0.12), inset -6px -6px 12px rgba(255, 250, 235, 0.8);
            border: none;
            padding: 12px 16px;
            color: #3B2E25;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            width: 100%;
            outline: none;
            transition: all 150ms ease;
        }
        .clay-input-well:focus {
            box-shadow: inset 8px 8px 16px rgba(107, 79, 58, 0.18), inset -8px -8px 16px rgba(255, 250, 235, 0.9), 0 0 0 2px #5C7A4A;
        }

       /* Range Inputs */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #5C7A4A;
            box-shadow: 2px 2px 5px rgba(107, 79, 58, 0.3), inset 1px 1px 2px rgba(255,255,255,0.4);
            cursor: pointer;
            margin-top: -8px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #E8DCC0;
            border-radius: 4px;
            box-shadow: inset 2px 2px 5px rgba(107, 79, 58, 0.2);
        }

        /* Blob Backgrounds */
        .blob-bg {
            position: absolute;
            filter: blur(60px);
            opacity: 0.4;
            z-index: -1;
            border-radius: 48px 16px 40px 12px;
        }

        /* Crop Badge Faux-Sculpting */
        .crop-badge {
            background: linear-gradient(135deg, #FBF6EA, #E8DCC0);
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(107,79,58,0.1), 4px 4px 10px rgba(107,79,58,0.1);
        }

        /* Loading Seed Animation */
        @keyframes pulse-seed {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .animate-seed { animation: pulse-seed 1.5s infinite ease-in-out; }

        /* Wobbly SVG Divider Pattern */
        .wobbly-line { width: 100%; height: 2px; }
    </style>
</head>
<body>
    
    <!-- Navigation -->
    <header class="w-full z-50 pt-6 px-4 md:px-8 max-w-7xl mx-auto flex-shrink-0">
        <nav class="flex justify-between items-center bg-clay-surface rounded-clay px-6 py-4 shadow-clay">
            <a href="#/" class="flex items-center gap-2 text-2xl font-heading font-bold text-soil hover:text-moss transition-colors">
                <i data-lucide="sprout" class="text-moss"></i> AgriSim
            </a>
            
            <div class="hidden md:flex gap-6 font-semibold text-bark" id="main-nav">
                <a href="#/" class="hover:text-moss transition-colors">Home</a>
                <a href="#/setup" class="hover:text-moss transition-colors">Workspace</a>
                <a href="#/strategy" class="hover:text-moss transition-colors">Strategy</a>
                <a href="#/results" class="hover:text-moss transition-colors">Journal</a>
                <a href="#/compare" class="hover:text-moss transition-colors">Compare</a>
            </div>

            <a href="#/setup" class="clay-btn px-6 py-2.5 text-sm">
                Get Started
            </a>
        </nav>
    </header>

    <!-- SPA Content Container -->
    <div id="app-content" class="flex-grow flex flex-col relative w-full"></div>

    <!-- Minimal Earthy Footer -->
    <footer class="mt-20 py-8 text-center text-soil opacity-70 font-semibold  w-full flex-shrink-0">
        <div class="max-w-4xl mx-auto flex flex-col items-center gap-4">
            <svg class="wobbly-line" preserveAspectRatio="none" viewBox="0 0 100 2"><path d="M0,1 Q25,2 50,1 T100,1" fill="none" stroke="#E8DCC0" stroke-width="2" stroke-linecap="round"/></svg>
            <p class="mt-4 text-sm flex items-center justify-center gap-2">
                <i data-lucide="leaf" class="w-4 h-4"></i> Designed for the Indian Farmer
            </p>
        </div>
    </footer>

    <!-- Load App Logic -->
    <script src="app.js"></script>
    <script>
        // Initialize Lucide icons on DOM Load
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
        });
        window.addEventListener('hashchange', () => {
            setTimeout(lucide.createIcons, 50); // Re-run after template mounts
        });
    </script>
</body>
</html>

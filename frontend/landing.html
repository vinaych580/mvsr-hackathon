<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AgriSim - Farm Strategy Simulator</title>
    
    <!-- Fonts: Fraunces & Quicksand -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clay: { bg: '#F4ECDD', surface: '#FBF6EA', deep: '#E8DCC0' },
                        moss: { DEFAULT: '#5C7A4A', deep: '#3F5A33' },
                        soil: '#6B4F3A', bark: '#3B2E25', saffron: '#E0A458'
                    },
                    fontFamily: { heading: ['Fraunces', 'serif'], body: ['Quicksand', 'sans-serif'] },
                    boxShadow: {
                        'clay': '8px 8px 20px rgba(107, 79, 58, 0.18), -6px -6px 16px rgba(255, 250, 235, 0.95), inset 1px 1px 2px rgba(255,255,255,0.6)',
                    },
                    borderRadius: { 'clay': '28px', 'blob': '48px 16px 40px 12px' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F4ECDD; color: #3B2E25; font-family: 'Quicksand', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
            pointer-events: none; z-index: 9999;
        }
        h1, h2, h3, .font-heading { font-family: 'Fraunces', serif; color: #6B4F3A; }
        .clay-btn { background-color: #5C7A4A; color: #FBF6EA; font-family: 'Fraunces', serif; font-weight: 600; border-radius: 28px; box-shadow: 8px 8px 20px rgba(107, 79, 58, 0.18), -6px -6px 16px rgba(255, 250, 235, 0.95), inset 1px 1px 2px rgba(255,255,255,0.6); display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; text-decoration: none; }
        .clay-card { background-color: #FBF6EA; border-radius: 28px; box-shadow: 8px 8px 20px rgba(107, 79, 58, 0.18), -6px -6px 16px rgba(255, 250, 235, 0.95), inset 1px 1px 2px rgba(255,255,255,0.9); }
        .crop-badge { background: linear-gradient(135deg, #FBF6EA, #E8DCC0); box-shadow: inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(107,79,58,0.1), 4px 4px 10px rgba(107,79,58,0.1); }
        .blob-bg { position: absolute; filter: blur(60px); opacity: 0.4; z-index: -1; border-radius: 48px 16px 40px 12px; }
        @keyframes pulse-seed { 0% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.5; } }
        .animate-seed { animation: pulse-seed 4s infinite ease-in-out; }
    </style>
</head>
<body>
    <header class="w-full z-50 pt-6 px-4 md:px-8 max-w-7xl mx-auto flex-shrink-0">
        <nav class="flex justify-between items-center bg-clay-surface rounded-clay px-6 py-4 shadow-clay">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-heading font-bold text-soil"><i data-lucide="sprout" class="text-moss"></i> AgriSim</a>
            <div class="hidden md:flex gap-6 font-semibold text-bark"><a href="#" class="text-moss border-b-2 border-moss pb-1">Home</a></div>
            <a href="index.html#/setup" class="clay-btn px-6 py-2.5 text-sm">Get Started</a>
        </nav>
    </header>

    <main class="relative px-6 py-20 lg:py-32 max-w-7xl mx-auto w-full flex flex-col lg:flex-row items-center gap-16 overflow-hidden min-h-[80vh] flex-grow">
        <div class="blob-bg bg-moss/20 w-96 h-96 top-0 sm:left-10"></div>
        <div class="blob-bg bg-saffron/20 w-[30rem] h-[30rem] bottom-10 sm:right-10"></div>

        <div class="flex-1 z-10">
            <h1 class="text-6xl md:text-8xl font-heading font-black text-soil mb-6 leading-[1.05] tracking-tight">Predict. Plan.<br/><span class="text-moss italic">Prosper.</span></h1>
            <p class="text-xl md:text-2xl text-bark/80 max-w-lg mb-10 leading-relaxed font-medium">Simulate and compare crop strategies before sowing. The field journal for the digital farmer.</p>
            <a href="index.html#/setup" class="clay-btn px-8 py-4 text-lg">Start Setup <i data-lucide="arrow-right" class="w-5 h-5"></i></a>
            <div class="absolute left-[35%] top-[10%] opacity-20 pointer-events-none animate-seed">
                <i data-lucide="leaf" class="w-20 h-20 text-moss transform rotate-45"></i>
            </div>
        </div>

        <div class="flex-1 w-full z-10 grid grid-cols-2 lg:grid-cols-4 gap-4" id="static-crops-grid">
            <!-- Simulated Load via JS below -->
        </div>
    </main>

    <footer class="mt-20 py-8 text-center text-soil opacity-70 font-semibold w-full flex-shrink-0">
        <div class="max-w-4xl mx-auto flex flex-col items-center gap-4">
            <svg style="width:100%; height:2px" preserveAspectRatio="none" viewBox="0 0 100 2"><path d="M0,1 Q25,2 50,1 T100,1" fill="none" stroke="#E8DCC0" stroke-width="2" stroke-linecap="round"/></svg>
            <p class="mt-4 text-sm flex items-center justify-center gap-2"><i data-lucide="leaf" class="w-4 h-4"></i> Designed for the Indian Farmer</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const emojiMap = {'rice':'🌾', 'wheat':'🍞', 'maize':'🌽', 'sugarcane':'🎋', 'cotton':'☁️', 'pulses':'🫘', 'groundnut':'🥜', 'soybean':'🌱'};
        fetch('http://localhost:8000/api/crops').then(res => res.json()).then(crops => {
            document.getElementById('static-crops-grid').innerHTML = crops.map(c => `
                <div class="clay-card flex flex-col items-center justify-center p-6 text-center min-h-[140px]">
                    <div class="w-14 h-14 rounded-full crop-badge flex items-center justify-center text-2xl mb-3">${emojiMap[c.crop_id]||'🌱'}</div>
                    <h3 class="font-heading font-bold text-soil">${c.crop_name}</h3>
                </div>
            `).join('');
        }).catch(err => {
            document.getElementById('static-crops-grid').innerHTML = '<p class="text-risk-rust col-span-4">Start the backend to witness live engine connections.</p>';
        });
    </script>
</body>
</html>
